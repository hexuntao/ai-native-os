# 统一质量门：PR 与 deploy 前置校验都复用这份 workflow，避免两套验证链路漂移。
name: reusable-quality-gate

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: ai_native_os
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      API_URL: http://localhost:3001
      APP_URL: http://localhost:3000
      BETTER_AUTH_SECRET: github-actions-better-auth-secret-change-me
      BETTER_AUTH_URL: http://localhost:3001
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ai_native_os
      NODE_ENV: test
      OPENAI_API_KEY: sk-test-placeholder
      REDIS_URL: redis://127.0.0.1:6379
      TRIGGER_API_URL: https://api.trigger.dev
      TRIGGER_SECRET_KEY: tr_test_placeholder
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Run build
        run: pnpm build

      - name: Verify Cloudflare API staging dry-run
        run: pnpm --filter @ai-native-os/api deploy:cloudflare:staging:dry-run

      - name: Verify Cloudflare worker staging dry-run
        run: pnpm --filter @ai-native-os/worker deploy:cloudflare:staging:dry-run
