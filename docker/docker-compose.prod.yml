services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_native_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d ${POSTGRES_DB:-ai_native_os}
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    volumes:
      - redis_data:/data

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    command:
      - pnpm
      - db:migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_native_os}
      NODE_ENV: production
    profiles:
      - ops
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_URL: ${PUBLIC_API_URL:-http://localhost:${NGINX_HTTP_PORT:-8080}}
      APP_URL: ${APP_URL:-http://localhost:${NGINX_HTTP_PORT:-8080}}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:${NGINX_HTTP_PORT:-8080}}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_native_os}
      NODE_ENV: production
      PORT: "3001"
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  jobs:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jobs
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_URL: ${PUBLIC_API_URL:-http://localhost:${NGINX_HTTP_PORT:-8080}}
      APP_URL: ${APP_URL:-http://localhost:${NGINX_HTTP_PORT:-8080}}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:${NGINX_HTTP_PORT:-8080}}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_native_os}
      NODE_ENV: production
      PORT: "3040"
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3040/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:3001
      APP_URL: ${APP_URL:-http://localhost:${NGINX_HTTP_PORT:-8080}}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:${NGINX_HTTP_PORT:-8080}}
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/healthz').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - ${NGINX_HTTP_PORT:-8080}:80
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
