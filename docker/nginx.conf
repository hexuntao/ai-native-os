map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream api_upstream {
  server api:3001;
}

upstream web_upstream {
  server web:3000;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 20m;
  proxy_http_version 1.1;

  # 统一透传原始请求头，保证 Better Auth、审计与追踪链路不漂移。
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;

  # 后端拥有的 contract-first API 面必须精确转发，不能吞掉 Next 自身的 /api/* route handlers。
  location = /health {
    proxy_pass http://api_upstream;
  }

  location = /api/openapi.json {
    proxy_pass http://api_upstream;
  }

  location /api/docs {
    proxy_pass http://api_upstream;
  }

  location /api/auth/ {
    proxy_pass http://api_upstream;
  }

  location /api/v1/ {
    proxy_pass http://api_upstream;
  }

  # Mastra 运行时需要保持长连接与升级头，避免流式响应被代理层截断。
  location /mastra/ {
    proxy_pass http://api_upstream;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  # CopilotKit 与 AG-UI 入口实际由 Next route handler 持有，因此保持走 web upstream。
  location = /api/copilotkit {
    proxy_pass http://web_upstream;
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  location = /api/ag-ui/runtime {
    proxy_pass http://web_upstream;
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  location = /api/ag-ui/runtime/events {
    proxy_pass http://web_upstream;
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  # 其余页面与同源 route handlers 统一交给 Next.js。
  location / {
    proxy_pass http://web_upstream;
  }
}
